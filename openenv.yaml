version: 1

tasks:
  - name: easy
    description: Reply politely to a client email
    grader:
      type: exact_match
      expected: reply
      reward: 0.8
      penalty: 0.3

  - name: medium
    description: Ignore spam email
    grader:
      type: exact_match
      expected: ignore
      reward: 0.7
      penalty: 0.2

  - name: hard
    description: Respond to urgent email quickly
    grader:
      type: exact_match
      expected: reply
      reward: 0.9
      penalty: 0.4
