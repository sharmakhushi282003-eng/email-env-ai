tasks:
  - id: easy
    description: Reply politely to a client email
    grader:
      type: simple
      expected_action: reply
      reward_correct: 0.8
      reward_incorrect: 0.3

  - id: medium
    description: Ignore spam email
    grader:
      type: simple
      expected_action: ignore
      reward_correct: 0.7
      reward_incorrect: 0.2

  - id: hard
    description: Respond to urgent email quickly
    grader:
      type: simple
      expected_action: reply
      reward_correct: 0.9
      reward_incorrect: 0.4
